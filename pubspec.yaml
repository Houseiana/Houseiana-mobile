name: houseiana_mobile_app
description: "A housing and real estate mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Networking
  dio: ^5.7.0

  # Functional Programming
  dartz: ^0.10.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Connectivity
  internet_connection_checker: ^3.0.1

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  curved_navigation_bar: ^1.0.6
  another_flushbar: ^1.12.30
  flutter_spinkit: ^5.2.1
  skeletonizer: ^1.4.3

  # Fonts
  google_fonts: ^6.2.1

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.1

  # Utilities
  image_picker: ^1.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
