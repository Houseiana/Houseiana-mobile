name: houseiana_mobile_app
description: "A housing and real estate mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Modern Icon Pack (used throughout the app via AppIcons)
  iconsax_plus: ^1.0.0

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Networking
  dio: ^5.7.0

  # Functional Programming
  dartz: ^0.10.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Connectivity
  internet_connection_checker: ^3.0.1

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  curved_navigation_bar: ^1.0.6
  another_flushbar: ^1.12.30
  flutter_spinkit: ^5.2.1
  skeletonizer: ^2.1.3

  # Fonts
  google_fonts: ^8.0.0

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.1

  # Utilities
  image_picker: ^1.1.2
  intl: ^0.20.2
  package_info_plus: ^8.0.2

  # Social Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple:

  # Payments
  paypal_checkout:
  webview_flutter: ^4.8.0

  # Chat & Real-time
  socket_io_client: ^3.0.3
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  firebase_auth:
  cloud_firestore: ^5.6.10

  # Calendar
  table_calendar: ^3.1.3

  # Sharing
  share_plus: ^10.1.4

  # Charts
  fl_chart: ^0.70.2

  # Video
#  video_player: ^2.9.3

  # i18n
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test:
  mocktail: ^1.0.4

  # Launcher icon generator
  flutter_launcher_icons: ^0.14.4

